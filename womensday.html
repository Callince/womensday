<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Women's Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100dvh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container img {
            width: 100%;
            height: 100dvh;
            object-fit: cover;
            object-position: center center;
            display: block;
            opacity: 0;
            transform: scale(1.05);
            animation: fadeInZoom 2s ease-out 0.3s forwards;
        }

        @keyframes fadeInZoom {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="full.png" alt="Happy Women's Day">
    </div>

    <audio id="bgMusic" loop preload="auto" autoplay>
        <source src="Good_Goodbye.mp3.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const img = document.querySelector('.container img');

        function startMusic() {
            audio.play().catch(() => {
                const events = ['click', 'touchstart', 'scroll', 'keydown'];
                function tryPlay() {
                    audio.play().then(() => {
                        events.forEach(e => document.removeEventListener(e, tryPlay));
                    }).catch(() => {});
                }
                events.forEach(e => document.addEventListener(e, tryPlay, { once: true }));
            });
        }

        // Wait for fade-in animation to finish, then start music
        img.addEventListener('animationend', startMusic);
    </script>
</body>
</html>
