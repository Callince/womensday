<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Women's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: #fff;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        /* QR Code Sections */
        .qr-section {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .qr-top {
            height: 35vw;
        }

        .qr-bottom {
            height: 35vw;
        }

        .qr-grid {
            position: absolute;
            display: grid;
            gap: 0;
        }

        /* Top QR - positioned top-left overflowing */
        .qr-top .qr-grid {
            top: -8vw;
            left: -5vw;
            width: 110vw;
            height: 50vw;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(10, 1fr);
        }

        /* Bottom QR - positioned bottom-right overflowing */
        .qr-bottom .qr-grid {
            bottom: -8vw;
            left: -5vw;
            width: 110vw;
            height: 50vw;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(10, 1fr);
        }

        .qr-cell {
            border-radius: 1px;
        }

        .qr-cell.filled {
            background: linear-gradient(135deg, #7c4dff, #9c6fff);
        }

        .qr-cell.dark {
            background: linear-gradient(135deg, #5a2dcc, #7c4dff);
        }

        .qr-cell.light {
            background: linear-gradient(135deg, #b388ff, #c9a0ff);
        }

        /* Middle Content */
        .content {
            text-align: center;
            padding: 8vw 6vw;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5vw;
        }

        /* QR DADA Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
        }

        .logo-icon {
            position: relative;
            width: 12vw;
            height: 12vw;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-text .brand {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 8vw;
            color: #1a1a2e;
            letter-spacing: 2px;
            line-height: 1;
        }

        .logo-text .tagline {
            font-family: Arial, sans-serif;
            font-size: 3vw;
            color: #7c4dff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Quote */
        .quote {
            font-family: 'Arial', sans-serif;
            font-size: 4vw;
            color: #333;
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1.8;
            font-weight: 500;
        }

        /* Happy Women's Day */
        .greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 12vw;
            background: linear-gradient(135deg, #7c4dff, #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        /* Finder patterns (the 3 big squares in QR corners) */
        .finder {
            position: absolute;
            border: 3.5vw solid;
            border-image: linear-gradient(135deg, #5a2dcc, #7c4dff) 1;
            width: 22vw;
            height: 22vw;
        }

        .finder::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 9vw;
            height: 9vw;
            background: linear-gradient(135deg, #5a2dcc, #7c4dff);
        }

        .finder-inner {
            position: absolute;
            top: 2.5vw;
            left: 2.5vw;
            right: 2.5vw;
            bottom: 2.5vw;
            border: 2vw solid transparent;
        }

        /* QR pattern using canvas */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (min-width: 768px) {
            .quote {
                font-size: 18px;
                letter-spacing: 4px;
            }
            .greeting {
                font-size: 64px;
            }
            .logo-text .brand {
                font-size: 42px;
            }
            .logo-text .tagline {
                font-size: 14px;
            }
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            .qr-top, .qr-bottom {
                height: 200px;
            }
            .finder {
                border-width: 18px;
                width: 120px;
                height: 120px;
            }
            .finder::after {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- Top QR Section -->
        <div class="qr-section qr-top">
            <canvas id="qrTop"></canvas>
        </div>

        <!-- Middle Content -->
        <div class="content">
            <!-- QR DADA Logo -->
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- QR icon -->
                        <rect x="4" y="4" width="24" height="24" rx="3" stroke="#7c4dff" stroke-width="5" fill="none"/>
                        <rect x="12" y="12" width="8" height="8" rx="1" fill="#7c4dff"/>
                        <rect x="34" y="4" width="10" height="10" rx="1" fill="#7c4dff"/>
                        <rect x="48" y="4" width="8" height="8" rx="1" fill="#7c4dff"/>
                        <rect x="34" y="18" width="8" height="8" rx="1" fill="#7c4dff"/>
                        <rect x="46" y="16" width="10" height="10" rx="1" fill="#7c4dff"/>
                        <!-- Magnifying glass handle -->
                        <line x1="42" y1="42" x2="56" y2="56" stroke="#7c4dff" stroke-width="5" stroke-linecap="round"/>
                        <circle cx="34" cy="34" r="12" stroke="#7c4dff" stroke-width="4" fill="none"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="brand">DADA</span>
                    <span class="tagline">Create your QR Code</span>
                </div>
            </div>

            <!-- Quote -->
            <p class="quote">
                If progress had a QR code,<br>
                it would lead to women.
            </p>

            <!-- Greeting -->
            <h1 class="greeting">Happy Women's Day!</h1>
        </div>

        <!-- Bottom QR Section -->
        <div class="qr-section qr-bottom">
            <canvas id="qrBottom"></canvas>
        </div>
    </div>

    <script>
        function drawQRPattern(canvasId, position) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const cellSize = w / 25;

            const purple1 = '#7c4dff';
            const purple2 = '#9c6fff';
            const purple3 = '#5a2dcc';
            const purpleLight = '#b388ff';

            // Draw random QR-like pattern
            const seed = position === 'top' ? 42 : 87;
            function seededRandom(i, j) {
                const x = Math.sin(seed + i * 127.1 + j * 311.7) * 43758.5453;
                return x - Math.floor(x);
            }

            const gridCols = Math.ceil(w / cellSize) + 2;
            const gridRows = Math.ceil(h / cellSize) + 2;

            // Draw QR cells
            for (let row = 0; row < gridRows; row++) {
                for (let col = 0; col < gridCols; col++) {
                    const x = col * cellSize;
                    const y = row * cellSize;

                    // Skip finder pattern areas
                    const inFinderTopLeft = col < 8 && row < 8;
                    const inFinderTopRight = col > gridCols - 9 && row < 8;
                    const inFinderBottomLeft = col < 8 && row > gridRows - 9;

                    if (position === 'top' && (inFinderTopLeft || inFinderTopRight)) continue;
                    if (position === 'bottom' && (inFinderBottomLeft || inFinderTopLeft)) continue;

                    const rand = seededRandom(row, col);
                    if (rand > 0.45) {
                        const colors = [purple1, purple2, purple3, purpleLight];
                        ctx.fillStyle = colors[Math.floor(rand * 4)];
                        ctx.fillRect(x, y, cellSize - 0.5, cellSize - 0.5);
                    }
                }
            }

            // Draw finder patterns (big squares)
            function drawFinder(cx, cy, size) {
                // Outer
                ctx.strokeStyle = purple3;
                ctx.lineWidth = size / 7;
                ctx.strokeRect(cx - size/2 + size/14, cy - size/2 + size/14, size - size/7, size - size/7);

                // Inner
                ctx.fillStyle = purple3;
                const innerSize = size * 3/7;
                ctx.fillRect(cx - innerSize/2, cy - innerSize/2, innerSize, innerSize);
            }

            const finderSize = cellSize * 7;
            const offset = finderSize / 2 + cellSize * 0.5;

            if (position === 'top') {
                drawFinder(offset - cellSize, offset - cellSize, finderSize);
                drawFinder(w - offset + cellSize, offset - cellSize, finderSize);
            } else {
                drawFinder(offset - cellSize, h - offset + cellSize, finderSize);
                drawFinder(w - offset + cellSize, h - offset + cellSize, finderSize);
            }
        }

        function init() {
            drawQRPattern('qrTop', 'top');
            drawQRPattern('qrBottom', 'bottom');
        }

        init();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
