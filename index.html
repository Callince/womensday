<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Women's Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100dvh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container img {
            width: 100%;
            height: 100dvh;
            object-fit: cover;
            object-position: center center;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="full.png" alt="Happy Women's Day">
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="Good_Goodbye.mp3.mpeg" type="audio/mpeg">
    </audio>

    <!-- Tap overlay to start music (autoplay requires user interaction) -->
    <div id="tapOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;cursor:pointer;"></div>

    <script>
        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('tapOverlay');

        function startMusic() {
            audio.play().then(() => {
                overlay.remove();
            }).catch(() => {});
        }

        overlay.addEventListener('click', startMusic);
        overlay.addEventListener('touchstart', startMusic);

        // Also try on any interaction
        document.addEventListener('click', () => audio.play().catch(() => {}), { once: true });
    </script>
</body>
</html>
