<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Women's Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100dvh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container img {
            width: 100%;
            height: 100dvh;
            object-fit: cover;
            object-position: center center;
            display: block;
            opacity: 0;
            transform: scale(1.05);
            animation: fadeInZoom 2s ease-out 0.3s forwards;
        }

        .shine-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(
                105deg,
                transparent 0%,
                transparent 35%,
                rgba(255, 255, 255, 0.4) 45%,
                rgba(255, 255, 255, 0.7) 50%,
                rgba(255, 255, 255, 0.4) 55%,
                transparent 65%,
                transparent 100%
            );
            background-size: 300% 100%;
            animation: shimmer 4s ease-in-out 2.5s infinite;
            opacity: 0;
        }

        @keyframes fadeInZoom {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% {
                opacity: 1;
                background-position: 200% center;
            }
            100% {
                opacity: 1;
                background-position: -200% center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="full.png" alt="Happy Women's Day">
        <div class="shine-overlay"></div>
    </div>

    <audio id="bgMusic" loop preload="auto" autoplay>
        <source src="Good_Goodbye.mp3.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');

        // Play immediately on page load
        audio.play().catch(() => {
            const events = ['click', 'touchstart', 'scroll', 'keydown'];
            function tryPlay() {
                audio.play().then(() => {
                    events.forEach(e => document.removeEventListener(e, tryPlay));
                }).catch(() => {});
            }
            events.forEach(e => document.addEventListener(e, tryPlay, { once: true }));
        });
    </script>
</body>
</html>
