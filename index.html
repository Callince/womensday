<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to QR DADA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .welcome {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6vw;
            background: #fff;
        }

        .logo {
            width: 70%;
            max-width: 400px;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideDown 1s ease-out 0.3s forwards;
        }

        .welcome-text {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 6vw;
            color: #1a1a2e;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .click-btn {
            display: inline-block;
            padding: 3.5vw 10vw;
            background: linear-gradient(135deg, #7c4dff, #5a2dcc);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 5vw;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.6s forwards;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(124, 77, 255, 0.3);
        }

        .click-btn:active {
            transform: scale(0.95);
        }

        .click-btn:hover {
            box-shadow: 0 6px 30px rgba(124, 77, 255, 0.5);
            transform: translateY(-2px);
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @media (min-width: 768px) {
            .welcome-text {
                font-size: 32px;
            }
            .click-btn {
                font-size: 22px;
                padding: 16px 60px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome">
        <img class="logo" src="qrdadalogo.png" alt="QR DADA Logo">
        <p class="welcome-text">Welcome to QR DADA</p>
        <a class="click-btn" href="womensday.html">Click Here</a>
    </div>
</body>
</html>
